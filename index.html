<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Desafio Flexível - Calendário</title>
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #27ae60;
            --bg: #f4f4f9;
            --text: #333;
            --card-bg: #fff;
            --danger: #e74c3c;
            --milestone-bg: #f39c12;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Dashboard --- */
        .dashboard {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 5px;
            z-index: 100;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .config-area {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
        }

        .config-item { display: flex; flex-direction: column; gap: 5px; }
        .config-item.full { grid-column: span 2; }
        .config-item label { font-size: 0.80em; color: #666; font-weight: bold; }
        
        input[type="date"], input[type="number"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }

        /* Área de Depósito Avulso em destaque */
        .highlight-box {
            background: #e8f8f5;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
        }
        .highlight-box label { color: var(--secondary); }
        .btn-abater {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-abater:active { transform: scale(0.95); }

        .total-value { font-size: 2.2em; font-weight: 800; color: var(--text); margin: 5px 0; }
        .total-label { font-size: 0.8em; color: #999; text-transform: uppercase; letter-spacing: 1px; }

        .progress-bar-bg {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- Marcos (Milestones) --- */
        .milestones-container {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: left;
        }
        .milestones-title { font-size: 0.85em; font-weight: bold; color: #666; margin-bottom: 10px; }
        .milestones-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .milestone-badge {
            background: #fff;
            border: 1px solid #ddd;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            color: #555;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .milestone-badge.achieved {
            background: var(--milestone-bg);
            color: white;
            border-color: var(--milestone-bg);
            font-weight: bold;
        }

        /* --- Grids --- */
        .container { width: 100%; max-width: 600px; padding-bottom: 60px; }
        
        h2 { 
            font-size: 1.1em; 
            color: #666; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 8px; 
            margin-top: 30px; 
            display: flex;
            justify-content: space-between;
        }
        h2 span { font-size: 0.8em; font-weight: normal; color: #999; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }

        .cell {
            background: var(--card-bg);
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 8px 2px;
            cursor: pointer;
            text-align: center;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 45px;
            transition: all 0.2s;
        }

        .cell-date { font-size: 0.9em; font-weight: bold; color: #555; margin-bottom: 2px; }
        .cell-value { font-size: 0.75em; color: #999; }

        .cell.checked {
            background-color: var(--primary);
            border-color: var(--secondary);
            box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3);
        }
        .cell.checked .cell-date, .cell.checked .cell-value { color: white; }

        .cell.today {
            border: 2px solid #3498db;
            background-color: #ebf5fb;
        }
        .cell.today.checked {
            background-color: var(--primary);
            border: 2px solid #27ae60;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .pulse-animation { animation: pulse 0.3s ease-in-out; }

        .btn-reset {
            margin-top: 40px;
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="total-label">Total Guardado</div>
        <div class="total-value" id="totalDisplay">R$ 0,00</div>

        <div class="config-area">
            <div class="config-item full highlight-box">
                <label for="avulsoInput">💰 Depósito Avulso (Abater dias):</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="avulsoInput" placeholder="Ex: 85" step="1" min="1">
                    <button class="btn-abater" onclick="abaterValor()">Abater</button>
                </div>
            </div>

            <div class="config-item full">
                <label for="startDate">📅 Data de Início:</label>
                <input type="date" id="startDate" onchange="handleConfigChange()">
            </div>
            <div class="config-item">
                <label for="goalAmount">🎯 Meta Total:</label>
                <input type="number" id="goalAmount" value="40200" step="100" onchange="handleConfigChange()">
            </div>
            <div class="config-item">
                <label for="maxDaily">📈 Teto Diário:</label>
                <input type="number" id="maxDaily" value="200" step="10" onchange="handleConfigChange()">
            </div>
        </div>

        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.75em; color: #aaa; margin-top: 4px;">
            <span id="percentText">0%</span>
            <span id="goalText">Meta: R$ 40.200</span>
        </div>

        <div class="milestones-container">
            <div class="milestones-title">🏆 Marcos do Desafio</div>
            <div class="milestones-grid" id="milestonesGrid"></div>
        </div>
    </div>

    <div class="container" id="cyclesContainer"></div>
    
    <div class="container" style="padding-top: 0;">
        <button class="btn-reset" onclick="resetData()">Reiniciar Tudo</button>
    </div>

    <script>
        let savedData = JSON.parse(localStorage.getItem('desafio_flex_v1')) || { 
            checkedDays: [],
            startDate: null,
            goalAmount: 40200,
            maxDaily: 200
        };

        const milestoneTargets = [100, 500, 1000, 5000, 10000, 20000, 30000, 40000];
        let generatedDays = []; 

        function init() {
            if(savedData.startDate) document.getElementById('startDate').value = savedData.startDate;
            document.getElementById('goalAmount').value = savedData.goalAmount || 40200;
            document.getElementById('maxDaily').value = savedData.maxDaily || 200;
            buildPlan();
        }

        function handleConfigChange() {
            savedData.startDate = document.getElementById('startDate').value;
            savedData.goalAmount = parseInt(document.getElementById('goalAmount').value) || 40200;
            savedData.maxDaily = parseInt(document.getElementById('maxDaily').value) || 200;
            saveData();
            buildPlan();
        }

        function buildPlan() {
            generatedDays = [];
            let currentSum = 0;
            let dayIndex = 0;
            let currentCycle = 1;
            let valueInCycle = 1;

            while(currentSum < savedData.goalAmount) {
                generatedDays.push({ index: dayIndex, value: valueInCycle, cycle: currentCycle });
                currentSum += valueInCycle;
                dayIndex++;
                valueInCycle++;

                if (valueInCycle > savedData.maxDaily) {
                    valueInCycle = 1;
                    currentCycle++;
                }
            }
            renderCycles();
            updateDashboard();
        }

        // === NOVA LÓGICA: DEPÓSITO AVULSO (Algoritmo Guloso) ===
        function abaterValor() {
            const input = document.getElementById('avulsoInput');
            let valorInformado = parseInt(input.value);

            if (isNaN(valorInformado) || valorInformado <= 0) {
                alert("Digite um valor válido maior que zero.");
                return;
            }

            // 1. Pega apenas os dias que ainda não foram marcados
            let uncheckedDays = generatedDays.filter(d => !savedData.checkedDays.includes(d.index));
            
            // 2. Ordena do MAIOR valor para o MENOR valor
            uncheckedDays.sort((a, b) => b.value - a.value);

            let valorRestante = valorInformado;
            let diasAbatidos = [];

            // 3. O Algoritmo Guloso: tenta encaixar o valor nos maiores dias possíveis
            for (let day of uncheckedDays) {
                if (valorRestante >= day.value) {
                    valorRestante -= day.value;
                    diasAbatidos.push(day.index);
                    savedData.checkedDays.push(day.index);
                }
                if (valorRestante === 0) break; // Termina se zerou o valor
            }

            if (diasAbatidos.length > 0) {
                saveData();
                renderCycles(); 
                updateDashboard();
                
                let msg = `Sucesso! R$ ${valorInformado - valorRestante} foram abatidos do calendário.`;
                if (valorRestante > 0) {
                    msg += `\nSobraram R$ ${valorRestante} que não formam um dia exato no momento.`;
                }
                alert(msg);
                input.value = ''; // Limpa o input
            } else {
                alert(`Não foi possível abater os R$ ${valorInformado}. O valor é menor que os dias disponíveis no momento.`);
            }
        }
        // ========================================================

        function getDateForIndex(daysToAdd, includeYear = false) {
            if(!savedData.startDate) return null;
            const date = new Date(savedData.startDate + 'T00:00:00');
            date.setDate(date.getDate() + daysToAdd);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return includeYear ? `${day}/${month}/${year}` : `${day}/${month}`;
        }

        function isToday(daysToAdd) {
            if(!savedData.startDate) return false;
            const cellDate = new Date(savedData.startDate + 'T00:00:00');
            cellDate.setDate(cellDate.getDate() + daysToAdd);
            const today = new Date();
            return cellDate.toDateString() === today.toDateString();
        }

        function renderCycles() {
            const container = document.getElementById('cyclesContainer');
            container.innerHTML = ''; 

            const cycles = {};
            generatedDays.forEach(day => {
                if(!cycles[day.cycle]) cycles[day.cycle] = [];
                cycles[day.cycle].push(day);
            });

            for (const [cycleNum, days] of Object.entries(cycles)) {
                const cycleTotal = days.reduce((a, b) => a + b.value, 0);
                const title = document.createElement('h2');
                title.innerHTML = `Ciclo ${cycleNum} <span>R$ ${cycleTotal}</span>`;
                container.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid';

                days.forEach(day => {
                    const btn = document.createElement('div');
                    btn.className = 'cell';
                    if (savedData.checkedDays.includes(day.index)) btn.classList.add('checked');
                    if (isToday(day.index)) btn.classList.add('today');

                    const dateString = getDateForIndex(day.index);
                    btn.innerHTML = `
                        <span class="cell-date">${dateString ? dateString : `#${day.index + 1}`}</span>
                        <span class="cell-value">R$ ${day.value}</span>
                    `;

                    btn.onclick = () => toggleCell(day.index, btn);
                    grid.appendChild(btn);
                });
                container.appendChild(grid);
            }
        }

        function toggleCell(dayIndex, element) {
            const pos = savedData.checkedDays.indexOf(dayIndex);
            element.classList.add('pulse-animation');
            setTimeout(() => element.classList.remove('pulse-animation'), 300);

            if (pos === -1) {
                savedData.checkedDays.push(dayIndex);
                element.classList.add('checked');
            } else {
                savedData.checkedDays.splice(pos, 1);
                element.classList.remove('checked');
            }
            saveData();
            updateDashboard();
        }

        function updateDashboard() {
            let currentSaved = 0;
            savedData.checkedDays.forEach(index => {
                const dayObj = generatedDays.find(d => d.index === index);
                if(dayObj) currentSaved += dayObj.value;
            });

            const percent = Math.min((currentSaved / savedData.goalAmount) * 100, 100);
            document.getElementById('totalDisplay').textContent = currentSaved.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').textContent = percent.toFixed(1) + '%';
            document.getElementById('goalText').textContent = `Meta: R$ ${savedData.goalAmount.toLocaleString('pt-BR')}`;

            renderMilestones(currentSaved);
        }

        function renderMilestones(currentSaved) {
            const container = document.getElementById('milestonesGrid');
            container.innerHTML = '';
            let cumulative = 0;
            let currentTargetIndex = 0;
            const milestoneDays = {};

            for (let i = 0; i < generatedDays.length; i++) {
                cumulative += generatedDays[i].value;
                while (currentTargetIndex < milestoneTargets.length && cumulative >= milestoneTargets[currentTargetIndex]) {
                    const target = milestoneTargets[currentTargetIndex];
                    if (target <= savedData.goalAmount) {
                        milestoneDays[target] = { date: getDateForIndex(i, true) || `Dia ${i + 1}` };
                    }
                    currentTargetIndex++;
                }
            }

            milestoneTargets.forEach(target => {
                if(target > savedData.goalAmount) return;
                const info = milestoneDays[target];
                const isAchieved = currentSaved >= target;
                const badge = document.createElement('div');
                badge.className = `milestone-badge ${isAchieved ? 'achieved' : ''}`;
                badge.innerHTML = `<span>${isAchieved ? '✅' : '🎯'} R$ ${target >= 1000 ? (target/1000)+'k' : target}</span> <span style="font-size: 0.8em; opacity: 0.8;">(${isAchieved ? 'Atingido!' : (info ? info.date : '--')})</span>`;
                container.appendChild(badge);
            });
        }

        function saveData() { localStorage.setItem('desafio_flex_v1', JSON.stringify(savedData)); }
        function resetData() {
            if(confirm("Deseja apagar tudo e começar do zero?")) {
                savedData.checkedDays = [];
                savedData.startDate = null;
                saveData();
                document.getElementById('startDate').value = "";
                init();
            }
        }

        // Inicialização do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Registrado!"))
            .catch(err => console.log("Falha no Service Worker", err));
        }

        init();
    </script>
</body>
</html>
